databases:
  - name: gigguard-db
    databaseName: gigguard
    user: gigguard
    plan: free          # upgrade to starter ($7/mo) before production

services:
  # ── Backend ────────────────────────────────────────────────────────────
  - type: web
    name: gigguard-backend
    runtime: node
    plan: starter       # must be always-on for cron trigger monitor
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: gigguard-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render generates a secure random value
      - key: ML_SERVICE_URL
        value: http://gigguard-ml:5001
      - key: PAYMENT_SERVICE_URL
        value: http://gigguard-payment:5002
      - key: PAYMENT_SERVICE_KEY
        sync: false           # set manually in Render dashboard (sensitive)
      - key: HEALTH_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false           # set to frontend Render URL after first deploy
      - key: FEATURE_PANDEMIC_TRIGGER_ENABLED
        value: true
      - key: PAYMENT_DRIVER
        value: dummy          # switch to razorpay when keys are ready

  # ── ML Service ─────────────────────────────────────────────────────────
  - type: web
    name: gigguard-ml
    runtime: python
    plan: free
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:5001 --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        fromDatabase:
          name: gigguard-db
          property: connectionString
      - key: PYTHON_ENV
        value: production

  # ── Payment Service ─────────────────────────────────────────────────────
  - type: web
    name: gigguard-payment
    runtime: node
    plan: free
    rootDir: payment-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5002
      - key: DATABASE_URL
        fromDatabase:
          name: gigguard-db
          property: connectionString
      - key: PAYMENT_DRIVER
        value: dummy
      - key: PAYMENT_SERVICE_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_ACCOUNT_NUMBER
        sync: false
      - key: FRONTEND_URL
        sync: false           # set to frontend Render URL after first deploy

  # ── Frontend ────────────────────────────────────────────────────────────
  - type: web
    name: gigguard-frontend
    runtime: node
    plan: free
    rootDir: gigguard-frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          name: gigguard-backend
          type: web
          property: host
      - key: BACKEND_URL
        fromService:
          name: gigguard-backend
          type: web
          property: host
