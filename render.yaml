services:
  # ---------------------------------------------------------------------------
  # 1. GigGuard Backend (Control Center)
  # ---------------------------------------------------------------------------
  - type: web
    name: gigguard-backend
    env: node
    plan: free # Can be upgraded to starter for private networking
    buildCommand: pnpm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gigguard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: gigguard-redis
          property: connectionString
      # PRO TIP: On Free tier, use the PUBLIC URL of the ML service
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: gigguard-ml
          property: url
      - key: PAYMENT_SERVICE_URL
        fromService:
          type: web
          name: gigguard-payments
          property: url

  # ---------------------------------------------------------------------------
  # 2. ML Service (Python/Flask)
  # ---------------------------------------------------------------------------
  - type: web
    name: gigguard-ml
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:5001 app:app
    envVars:
      - key: PORT
        value: 5001 # Critical: Override default port
      - key: DATABASE_URL
        fromDatabase:
          name: gigguard-db
          property: connectionString

  # ---------------------------------------------------------------------------
  # 3. Payment Service (Node.js)
  # ---------------------------------------------------------------------------
  - type: web
    name: gigguard-payments
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5002 # Critical: Override default port
      - key: DATABASE_URL
        fromDatabase:
          name: gigguard-db
          property: connectionString

  # ---------------------------------------------------------------------------
  # 4. Frontend (Next.js)
  # ---------------------------------------------------------------------------
  - type: web
    name: gigguard-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: gigguard-backend
          property: url

# ---------------------------------------------------------------------------
# Databases
# ---------------------------------------------------------------------------
databases:
  - name: gigguard-db
    plan: free

# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
redis:
  - name: gigguard-redis
    plan: free
    ipAllowList: [] # Allows all internal traffic
