services:
  postgres:
    image: postgres:15-alpine
    container_name: gigguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gigguard
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gigguard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: gigguard-ml
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      ML_SERVICE_PORT: 5001
      DATABASE_URL: postgresql://postgres:password@postgres:5432/gigguard
      SAC_MODEL_PATH: /app/models/sac_premium_v1.zip
      IF_MODEL_PATH: /app/models/isolation_forest.pkl
      LOG_LEVEL: INFO
    ports:
      - "5001:5001"
    volumes:
      - ./ml-service/models:/app/models
      - ./ml-service/data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigguard-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/gigguard
      ML_SERVICE_URL: http://ml-service:5001
      ML_SERVICE_TIMEOUT_MS: 500
      OPENWEATHERMAP_API_KEY: your_key_here
      OPENWEATHERMAP_BASE_URL: https://api.openweathermap.org/data/3.0
      AQICN_API_KEY: your_key_here
      AQICN_BASE_URL: https://api.waqi.info/feed
      JWT_SECRET: change_me_backend_jwt_secret
      INSURER_LOGIN_SECRET: change_me_insurer_secret
      REDIS_URL: redis://redis:6379
      USE_MOCK_APIS: "true"
      USE_MOCK_PAYOUT: "true"
      RAZORPAY_KEY_ID: rzp_test_xxxx
      RAZORPAY_KEY_SECRET: change_me_razorpay_secret
      RAZORPAY_WEBHOOK_SECRET: change_me_razorpay_webhook_secret
      RAZORPAY_ACCOUNT_NUMBER: "1234567890"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>{if(!r.ok) process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./gigguard-frontend
      dockerfile: Dockerfile
    container_name: gigguard-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_xxxx
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
